{{ define "main" }}
<section class="list">
  {{ if not .IsHome }}<h1>{{ .Title }}</h1>{{ end }}
  {{ with .Content }}<div class="list-content">{{ . }}</div>{{ end }}
  <ul class="post-list">
    {{ range .Pages }}
    <li>
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
